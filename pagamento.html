<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pagamento | ReadIt</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header-topo"><div class="container">
            <h1 class="titulo-site" onclick="window.location.href='index.html'">
                    READ<span class="titulo-site-span">IT</span>
                </h1>
        </div>
    </header>
    
    <main class="container caixa-checkout">
        <h2 class="checkout-titulo">DADOS PARA ENTREGA</h2>
        <label class="label-pagamento">Nome Completo:</label><input type="text" class="input-pagamento">
        <label class="label-pagamento">Endereço:</label><input type="text" class="input-pagamento">
        <label class="label-pagamento">Número:</label><input type="text" class="input-pagamento">
        <label class="label-pagamento">Complemento:</label><input type="text" class="input-pagamento">
        <label class="label-pagamento">CEP:</label><input type="text" placeholder="00000-000" class="input-pagamento">
        <label class="label-pagamento">Bairro:</label><input type="text" class="input-pagamento">
        <label class="label-pagamento">Cidade:</label><input type="text" class="input-pagamento">
        <label class="label-pagamento">UF:</label><input type="text" maxlength="2" class="input-pagamento">
        <label class="label-pagamento">E-mail:</label><input type="email" class="input-pagamento">
        <label class="label-pagamento">Telefone:</label><input type="tel" placeholder="(21) 99999-9999" class="input-pagamento">
            
<h2 class="checkout-titulo" style="margin-top: 40px;">MÉTODO DE PAGAMENTO</h2>
        
        <div class="pagamento-opcoes">
            <label class="metodo-item">
                <input type="radio" name="pgto" value="pix" onchange="mostrarPagamento()"> 📱 Pix
            </label>

            <label class="metodo-item">
                <input type="radio" name="pgto" value="boleto" onchange="mostrarPagamento()"> 📄 Boleto Bancário
            </label>
        </div>

        <div id="area-resultado"></div>

        <button class="btn-checkout" onclick="alert('Pedido Finalizado com Sucesso!')">FINALIZAR PEDIDO</button>
        <div id="area-resultado"></div>

        
        
    </main>

    <script src="js/script.js"></script>
</body>
</html>
